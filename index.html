<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Server</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 22px;
        }

        .card {
            width: 60%;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: white;
            color: #007bff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Welcome to Nginx</h1>

    <div class="card">
        <p>Nginx Web Server is Running Successfully!</p>
        <p>Hosted via Docker / Jenkins CI-CD Pipeline</p>
        <a href="#" class="btn">Learn More</a>
    </div>
</div>

</body>
</html>
